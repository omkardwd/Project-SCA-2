name: ZAP Website Scan

on:
  push:
    branches:
      - main

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Run ZAP Baseline Scan (fixed)
      - name: ZAP Baseline Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            -w /zap/wrk \
            zaproxy/zap-stable \
            zap-baseline.py \
            -t https://www.vulnhub.com \
            -r zap-report.html \
            --exit-code-on-fail 0 || true

      # ✅ Debug (important)
      - name: Verify report
        run: |
          ls -la

      # ✅ Upload report
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html
